        // 切換日期引擎
        function switchDay(dayId) {
            const data = fullItinerary[dayId];
            
            // 更新頁面動態 UI 標籤
            document.getElementById('current-day-badge').innerText = `${data.day} ${data.date} (${data.week})`;
            document.getElementById('alert-text').innerText = data.alert;
            document.getElementById('route-type-tag').innerText = `路線：${data.routeType}`;

            // 更新高亮狀態的 Tab 按鈕樣式
            Object.keys(fullItinerary).forEach(d => {
                const btn = document.getElementById(`tab-idx-${d}`);
                if (parseInt(d) === dayId) {
                    btn.className = "flex flex-col items-center justify-center px-4 py-2.5 rounded-xl text-xs font-black tracking-wider transition-all duration-150 shrink-0 min-w-[72px] bg-amber-400 text-slate-950 shadow-md shadow-amber-400/20";
                } else {
                    btn.className = "flex flex-col items-center justify-center px-4 py-2.5 rounded-xl text-xs font-bold tracking-wider transition-all duration-150 shrink-0 min-w-[72px] bg-slate-800 text-slate-400 border border-slate-700/40 hover:bg-slate-700/60";
                }
            });

            // 渲染當日焦點大卡片
            const highlightBox = document.getElementById('highlight-section');
            let badgeStyle = "bg-amber-500/10 text-amber-300 border-amber-500/20";
            let mainIcon = "utensils";
            
            if (data.highlight.type === 'FLIGHT') { badgeStyle = "bg-blue-500/10 text-blue-300 border-blue-500/20"; mainIcon = "plane-takeoff"; }
            if (data.highlight.type === 'WARNING') { badgeStyle = "bg-rose-500/10 text-rose-300 border-rose-500/20"; mainIcon = "alert-triangle"; }
            if (data.highlight.type === 'FLEXIBLE') { badgeStyle = "bg-emerald-500/10 text-emerald-300 border-emerald-500/20"; mainIcon = "map-pin"; }

            highlightBox.innerHTML = `
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold tracking-widest px-2.5 py-0.5 rounded-md border ${badgeStyle} flex items-center gap-1">
                        <i data-lucide="${mainIcon}" class="w-3 h-3"></i> ${data.highlight.type}
                    </span>
                    <span class="text-[11px] text-slate-400 font-mono">${data.highlight.meta}</span>
                </div>
                <h4 class="text-base font-extrabold text-slate-100">${data.highlight.title}</h4>
                <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800 space-y-1">
                    <p class="text-xs font-mono font-bold text-amber-400">${data.highlight.code}</p>
                    <p class="text-[11px] text-slate-300 leading-relaxed">${data.highlight.desc}</p>
                </div>
            `;

            // 渲染當日時間軸細節
            const timelineBox = document.getElementById('timeline-container');
            timelineBox.innerHTML = '';
            
            data.timeline.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = "flex gap-4 items-start timeline-line relative py-3 px-1 group";
                row.innerHTML = `
                    <div class="text-xs font-mono font-bold text-amber-400 w-12 shrink-0 pt-0.5 text-right tracking-tighter">${item.time}</div>
                    <div class="relative pl-6 z-10 flex-1 space-y-1">
                        <div class="absolute -left-[4px] top-1.5 w-2.5 h-2.5 rounded-full bg-slate-700 border-2 border-slate-900 group-hover:bg-amber-400 group-hover:border-amber-950 transition-colors"></div>
                        <div class="flex justify-between items-start gap-2">
                            <h5 class="text-xs font-bold text-slate-100 leading-snug group-hover:text-amber-300 transition-colors">${item.name}</h5>
                            <a href="${item.map}" target="_blank" class="text-[10px] text-blue-400 hover:text-blue-300 flex items-center gap-0.5 shrink-0 bg-blue-500/5 px-2 py-0.5 rounded border border-blue-500/10 hover:border-blue-500/30 transition">
                                <i data-lucide="map-pinned" class="w-2.5 h-2.5"></i> 地圖導航
                            </a>
                        </div>
                        <p class="text-[11px] text-slate-400 leading-relaxed">${item.note}</p>
                    </div>
                `;
                timelineBox.appendChild(row);
            });

            // 觸發 Lucide 圖標重新解析渲染
            lucide.createIcons();
        }

        // 初始化頂部 Tabs
        function initTabs() {
            const container = document.getElementById('tabs-container');
            Object.keys(fullItinerary).forEach(d => {
                const item = fullItinerary[d];
                const btn = document.createElement('button');
                btn.id = `tab-idx-${d}`;
                btn.onclick = () => switchDay(parseInt(d));
                btn.innerHTML = `
                    <span class="text-[9px] opacity-60 font-mono tracking-tighter">${item.day}</span>
                    <span class="text-sm font-black mt-0.5">${item.date.split('/')[1]}</span>
                `;
                container.appendChild(btn);
            });
        }

                "3. D6 觀光限定 Shu*Kura 清酒列車\n" +
                "   - 提醒：行程前2週需於 JR 官網完成預約劃位\n\n" +
                "4. D4 金澤21世紀美術館\n" +
                "   - 提醒：熱門「泳池區」須提早於官方網站預約門票"
            );
        }

        // 應用程式啟動入口
        window.onload = function() {
            initTabs();
            switchDay(1); // 預設載入第一天
        };
    </script>
